<div class="page">
  @if (notFound) {
    <div class="not-found">
      <p>Статья не найдена.</p>
      <button class="btn btn-ghost" (click)="cancel()">← К списку</button>
    </div>
  } @else {
    <header class="page-header">
      <button class="btn btn-ghost" (click)="cancel()">← Назад</button>
      <h1>Редактировать статью</h1>
    </header>

    <main class="form-container">
      <div class="form-group">
        <label for="title">Заголовок</label>
        <input
          id="title"
          type="text"
          class="input"
          placeholder="Введите заголовок статьи"
          [(ngModel)]="title"
        />
      </div>

      <div class="form-group">
        <label for="content">Текст статьи</label>
        <textarea
          id="content"
          class="textarea"
          placeholder="Введите текст статьи"
          rows="16"
          [(ngModel)]="content"
        ></textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn-ghost" (click)="cancel()">Отмена</button>
        <button class="btn btn-primary" (click)="save()" [disabled]="!title.trim() || !content.trim()">
          Сохранить
        </button>
      </div>
    </main>
  }
</div>
